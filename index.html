<body>

    <h1>🌸 Festivals of India 🌸</h1>

    <div class="festival">
        <h2>Diwali</h2>
        <p><strong>Why we celebrate:</strong> Lord Rama returned to Ayodhya after defeating Ravana.</p>
        <p><strong>Significance:</strong> Victory of good over evil and light over darkness.</p>
    </div>

    <div class="festival">
        <h2>Holi</h2>
        <p><strong>Why we celebrate:</strong> Based on the story of Prahlada and Holika.</p>
        <p><strong>Significance:</strong> Festival of colors and unity.</p>
    </div>

</body>
